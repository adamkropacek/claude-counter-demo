<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Claude - Global Credit Pool</title>
<meta name="description" content="Live credit pool counter (demo)" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Newsreader:ital,wght@0,400;0,500;0,600;0,700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #141318;
    --bg-grad-1: #1a1a24;
    --bg-grad-2: #0d0c12;
    --fg: #f5f4ef;
    --fg-dim: #8a8a92;
    --accent: #d97757;
    --accent-glow: rgba(217, 119, 87, 0.35);
    --line: rgba(245, 244, 239, 0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow: hidden;
  }

  body {
    background:
      radial-gradient(ellipse at 30% 20%, rgba(75, 65, 110, 0.22) 0%, transparent 55%),
      radial-gradient(ellipse at 75% 80%, rgba(217, 119, 87, 0.08) 0%, transparent 60%),
      linear-gradient(180deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* TOP NAV */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 36px;
    border-bottom: 1px solid var(--line);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand-mark {
    width: 22px;
    height: 22px;
    color: var(--accent);
  }

  .brand-text {
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }

  .brand-by {
    font-size: 11px;
    font-weight: 400;
    color: var(--fg-dim);
    margin-left: 6px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 13px;
    color: var(--fg-dim);
  }

  .status-dot {
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .status-dot::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 8px rgba(74, 222, 128, 0.6);
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .menu-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: rgba(255,255,255,0.04);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--fg-dim);
  }

  /* MAIN */
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }

  .counter-card {
    text-align: center;
    max-width: 760px;
    width: 100%;
  }

  .asterisk {
    width: 38px;
    height: 38px;
    color: var(--accent);
    margin: 0 auto 28px;
    filter: drop-shadow(0 0 12px var(--accent-glow));
    animation: spin-slow 24s linear infinite;
  }

  @keyframes spin-slow {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--fg-dim);
    margin-bottom: 28px;
  }

  .label .sep {
    color: var(--accent);
    margin: 0 8px;
  }

  .pool-amount {
    position: relative;
    display: inline-block;
    font-family: 'Newsreader', 'Times New Roman', serif;
    font-size: clamp(72px, 14vw, 184px);
    font-weight: 500;
    letter-spacing: -0.04em;
    line-height: 1;
    color: var(--fg);
    margin-bottom: 26px;
    font-variant-numeric: tabular-nums;
    transition: transform 0.4s ease-out;
    text-shadow: 0 0 60px rgba(245, 244, 239, 0.04);
  }

  .pool-amount.flicker {
    transform: scale(1.003);
  }

  .pool-amount .currency {
    font-size: 0.55em;
    vertical-align: top;
    margin-right: 2px;
    color: var(--fg-dim);
    font-weight: 400;
  }

  .delta-flash {
    position: absolute;
    top: 4%;
    right: -8px;
    transform: translateX(100%);
    font-family: 'Inter', sans-serif;
    font-size: 0.14em;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.02em;
    opacity: 0;
    pointer-events: none;
    white-space: nowrap;
  }
  .delta-flash.show {
    animation: delta-pop 1.4s ease-out;
  }
  @keyframes delta-pop {
    0%   { opacity: 0; transform: translate(100%, 12px); }
    18%  { opacity: 1; transform: translate(100%, -2px); }
    100% { opacity: 0; transform: translate(110%, -42px); }
  }

  .spent-line {
    font-size: 13px;
    color: var(--fg-dim);
    letter-spacing: 0.02em;
  }

  .spent-line .amount {
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    font-weight: 500;
  }

  .spent-line .live {
    display: inline-block;
    margin-left: 10px;
    padding: 2px 8px;
    border-radius: 999px;
    background: rgba(217, 119, 87, 0.12);
    border: 1px solid rgba(217, 119, 87, 0.3);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
  }

  /* FOOTER STATS */
  footer {
    display: flex;
    justify-content: center;
    gap: 64px;
    padding: 24px 36px 36px;
    border-top: 1px solid var(--line);
  }

  .stat {
    text-align: center;
  }

  .stat-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--fg-dim);
    margin-bottom: 6px;
  }

  .stat-value {
    font-size: 16px;
    font-weight: 500;
    color: var(--fg);
    font-variant-numeric: tabular-nums;
  }

  .stat-value .delta {
    font-size: 11px;
    color: var(--accent);
    margin-left: 6px;
  }

  /* RESPONSIVE */
  @media (max-width: 640px) {
    header { padding: 16px 20px; }
    .nav-right { gap: 12px; font-size: 11px; }
    .brand-by { display: none; }
    footer { gap: 24px; padding: 18px 16px 24px; flex-wrap: wrap; }
    .stat-value { font-size: 13px; }
  }
</style>
</head>
<body>
  <header>
    <div class="brand">
      <svg class="brand-mark" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 0 L13.8 9.4 L22 4.4 L17 12.6 L24 14.4 L14.6 16.2 L19.6 24 L12 19 L4.4 24 L9.4 16.2 L0 14.4 L7 12.6 L2 4.4 L10.2 9.4 Z"/>
      </svg>
      <span class="brand-text">Claude<span class="brand-by">by Anthropic</span></span>
    </div>
    <div class="nav-right">
      <span class="status-dot">Live</span>
      <span>API</span>
      <span>Docs</span>
      <button class="menu-btn" aria-label="menu">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </header>

  <main>
    <div class="counter-card">
      <svg class="asterisk" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 0 L13.8 9.4 L22 4.4 L17 12.6 L24 14.4 L14.6 16.2 L19.6 24 L12 19 L4.4 24 L9.4 16.2 L0 14.4 L7 12.6 L2 4.4 L10.2 9.4 Z"/>
      </svg>
      <div class="label">
        Global Usage<span class="sep">&middot;</span>Today
      </div>
      <div class="pool-amount" id="poolAmount">
        <span class="currency">$</span><span id="poolValue">58,793</span>
        <span class="delta-flash" id="deltaFlash"></span>
      </div>
      <div class="spent-line">
        Burning <span class="amount" id="spentValue">$0.00</span>/min across the network
        <span class="live">Live</span>
      </div>
    </div>
  </main>

  <footer>
    <div class="stat">
      <div class="stat-label">Burn Rate</div>
      <div class="stat-value"><span id="burnRate">0.00</span>/s</div>
    </div>
    <div class="stat">
      <div class="stat-label">Active Sessions</div>
      <div class="stat-value"><span id="sessions">0</span><span class="delta" id="sessionsDelta">+0</span></div>
    </div>
    <div class="stat">
      <div class="stat-label">Tokens / Min</div>
      <div class="stat-value"><span id="tpm">0</span></div>
    </div>
    <div class="stat">
      <div class="stat-label">Models Online</div>
      <div class="stat-value">3<span class="delta">all</span></div>
    </div>
  </footer>

<script>
  // FAKE COUNTER ENGINE
  // Counter rises ("today's global usage"), with realistic non-uniform cadence:
  //   long pauses, slow flow, normal flow, occasional rapid bursts,
  //   and rare "mega transactions" - so it never feels like a metronome.

  const state = {
    total: 58793.42,
    sessions: 142,
    sessionsLast: 142,
    lastDelta: 0,
    burnPerMin: 0,
  };

  const el = {
    poolValue: document.getElementById('poolValue'),
    poolAmount: document.getElementById('poolAmount'),
    spentValue: document.getElementById('spentValue'),
    burnRate: document.getElementById('burnRate'),
    sessions: document.getElementById('sessions'),
    sessionsDelta: document.getElementById('sessionsDelta'),
    tpm: document.getElementById('tpm'),
    deltaFlash: document.getElementById('deltaFlash'),
  };

  function fmt(n, decimals) {
    return n.toLocaleString('en-US', {
      minimumFractionDigits: decimals,
      maximumFractionDigits: decimals,
    });
  }

  function rand(min, max) {
    return Math.random() * (max - min) + min;
  }

  // INTERVAL DISTRIBUTION (ms between updates):
  //   5%  long pause (3.2-6.0s) - quiet moment, no traffic
  //   25% slow flow  (1.2-2.4s)
  //   35% medium     (0.6-1.3s)
  //   25% normal     (0.3-0.7s)
  //   10% quick      (0.14-0.32s)
  function nextInterval() {
    const r = Math.random();
    if (r < 0.05) return rand(3200, 6000);
    if (r < 0.30) return rand(1200, 2400);
    if (r < 0.65) return rand(600, 1300);
    if (r < 0.90) return rand(300, 700);
    return rand(140, 320);
  }

  // DELTA SIZE DISTRIBUTION ($ per update):
  //   1%  massive    ($220-680)  - large enterprise transaction
  //   5%  big        ($60-180)
  //   20% medium     ($8-40)
  //   55% normal     ($1.40-8.00)
  //   19% small      ($0.20-1.40)
  function nextDelta() {
    const r = Math.random();
    if (r < 0.01) return rand(220, 680);
    if (r < 0.06) return rand(60, 180);
    if (r < 0.26) return rand(8, 40);
    if (r < 0.81) return rand(1.40, 8.00);
    return rand(0.20, 1.40);
  }

  // BURST: occasionally fire 2-4 quick updates in 100-280ms each
  let burstQueue = 0;
  let recentDeltas = []; // last 60s for burn-per-min display

  function tick() {
    if (burstQueue === 0 && Math.random() < 0.05) {
      burstQueue = Math.floor(rand(2, 5)); // 2-4
    }

    const inBurst = burstQueue > 0;
    if (inBurst) burstQueue--;

    // burst deltas are smaller (rapid micro-charges) so visual jumps make sense
    const delta = nextDelta() * (inBurst ? 0.55 : 1);
    state.total += delta;
    state.lastDelta = delta;

    // burn-per-min: sum of last 60s of deltas
    const now = performance.now();
    recentDeltas.push({ t: now, v: delta });
    recentDeltas = recentDeltas.filter(d => now - d.t < 60000);
    state.burnPerMin = recentDeltas.reduce((s, d) => s + d.v, 0);

    // sessions drift occasionally
    if (Math.random() < 0.10) {
      const change = Math.round(rand(-2, 5));
      state.sessions = Math.max(80, state.sessions + change);
    }

    return inBurst;
  }

  function render() {
    // integer display - matches screenshot aesthetic
    el.poolValue.textContent = Math.round(state.total).toLocaleString('en-US');

    el.spentValue.textContent = '$' + fmt(state.burnPerMin, 2);
    el.burnRate.textContent = '$' + fmt(state.burnPerMin / 60, 2);

    el.sessions.textContent = state.sessions.toLocaleString('en-US');
    const sd = state.sessions - state.sessionsLast;
    if (sd !== 0) {
      el.sessionsDelta.textContent = (sd > 0 ? '+' : '') + sd;
      el.sessionsDelta.style.color = sd > 0 ? 'var(--accent)' : '#ef4444';
    }

    // tokens per min: burn * 180-320 (rough avg cost-per-token bucket)
    el.tpm.textContent = Math.round(state.burnPerMin * rand(180, 320)).toLocaleString('en-US');

    // delta flash - shows the actual increment that just landed
    if (state.lastDelta > 0) {
      const decimals = state.lastDelta < 10 ? 2 : 0;
      el.deltaFlash.textContent = '+$' + fmt(state.lastDelta, decimals);
      el.deltaFlash.classList.remove('show');
      void el.deltaFlash.offsetWidth; // force reflow to restart animation
      el.deltaFlash.classList.add('show');
    }

    el.poolAmount.classList.add('flicker');
    setTimeout(() => el.poolAmount.classList.remove('flicker'), 220);
  }

  setInterval(() => { state.sessionsLast = state.sessions; }, 10000);

  render();

  function loop() {
    tick();
    render();
    // burst sequence: short interval; otherwise weighted distribution
    const interval = burstQueue > 0 ? rand(110, 260) : nextInterval();
    setTimeout(loop, interval);
  }
  setTimeout(loop, 700);
</script>
</body>
</html>
